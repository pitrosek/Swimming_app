{% extends 'base.html' %}

{% block title %}Přihlášení - Plavecké Závody{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0" style="color: var(--primary-color);">
                        <i class="bi bi-box-arrow-in-right"></i> Přihlášení
                    </h3>
                </div>
                <div class="card-body">
                    <form method="post" class="needs-validation">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person"></i> Uživatelské jméno
                            </label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock"></i> Heslo
                            </label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Přihlásit se
                        </button>
                    </form>

                    <hr>

                    <p class="text-center text-muted mb-0">
                        Nemáte účet? 
                        <a href="{% url 'register' %}" style="color: var(--primary-color); font-weight: 600;">
                            Registrujte se zde
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
