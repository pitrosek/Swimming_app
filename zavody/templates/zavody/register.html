{% extends 'base.html' %}

{% block title %}Registrace - Plavecké Závody{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0" style="color: var(--primary-color);">
                        <i class="bi bi-person-plus"></i> Nový Účet
                    </h3>
                </div>
                <div class="card-body">
                    <form method="post" class="needs-validation">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="first_name" class="form-label">
                                    <i class="bi bi-person"></i> Jméno
                                </label>
                                <input type="text" class="form-control" id="first_name" name="first_name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="last_name" class="form-label">
                                    <i class="bi bi-person"></i> Příjmení
                                </label>
                                <input type="text" class="form-control" id="last_name" name="last_name">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person-badge"></i> Uživatelské jméno
                            </label>
                            <input type="text" class="form-control" id="username" name="username" required>
                            <small class="text-muted">Pouze písmena, čísla a @/./+/-/_</small>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope"></i> Email
                            </label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">
                                <i class="bi bi-award"></i> Vyberte roli
                            </label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="">--- Zvolte roli ---</option>
                                <option value="plavec">Plavec</option>
                                <option value="trener">Trenér</option>
                            </select>
                        </div>

                        <!-- Výběr klubu (pouze pro trenéry) -->
                        <div class="mb-3" id="klub_container" style="display: none;">
                            <label for="klub" class="form-label">
                                <i class="bi bi-building"></i> Klub
                            </label>
                            <select class="form-select" id="klub" name="klub">
                                <option value="">--- Zvolte klub ---</option>
                                {% for k in kluby %}
                                    <option value="{{ k.klub_id }}">{{ k.nazev }}</option>
                                {% endfor %}
                            </select>
                            <small class="text-muted">Vyberte klub, ke kterému patříte</small>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock"></i> Heslo
                            </label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <small class="text-muted">Minimálně 8 znaků</small>
                        </div>

                        <div class="mb-3">
                            <label for="password2" class="form-label">
                                <i class="bi bi-lock"></i> Potvrzení Hesla
                            </label>
                            <input type="password" class="form-control" id="password2" name="password2" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-check-circle"></i> Registrovat se
                        </button>
                    </form>

                    <hr>

                    <p class="text-center text-muted mb-0">
                        Již máte účet? 
                        <a href="{% url 'login' %}" style="color: var(--primary-color); font-weight: 600;">
                            Přihlaste se zde
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Zobrazit/skrýt výběr klubu dle role
document.getElementById('role').addEventListener('change', function() {
    const klubContainer = document.getElementById('klub_container');
    const klubSelect = document.getElementById('klub');
    
    if (this.value === 'trener') {
        klubContainer.style.display = 'block';
        klubSelect.required = true;
    } else {
        klubContainer.style.display = 'none';
        klubSelect.required = false;
        klubSelect.value = '';
    }
});
</script>
{% endblock %}
